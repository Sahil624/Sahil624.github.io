  projects:
    enable: true
    items:
      - title: QUINTET - AI Powered Quantum Education Toolkit
        content: >
          This research introduces QUINTET, a novel containerized educational platform that eliminates this fragmentation by 
          embedding interactive gamified modules and a customized quantum network simulation engine directly into a unified 
          notebook environment. To provide real-time, context-aware support, the system integrates a dual-agent Artificial 
          Intelligence framework driven by an active Retrieval-Augmented Generation pipeline, alongside a dynamic curriculum 
          generator that personalizes learning paths based on a student's prior knowledge and time constraints. 
        image: quantum_crypto.webp
        badges:
          - Python
          - AI
          - Quantum Cryptography
          - LangChain
          - Graduate Thesis
        links:
          - icon: fab fa-github
            url: https://github.com/Sahil624/qToolkit

      - title: QGrasp - Mobile app for quantum computing education
        content: >
          QuantumGrasp is a mobile app for quantum computing education. Students build circuits from physical playmats or on-screen controls, 
          run on-device simulation, and see probabilities and circuit diagrams update in real time. The longer-term vision is a tactile, 
          AR-forward experience (markers, 3D Bloch visualization, spatial measurement). 
          The current build focuses on the learn → simulate → visualize loop on React Native / Expo. 
        image: qgrasp.png
        badges:
          - ReactNative
          - Expo
          - Computer Vision
          - Quantum Circuts
          - Graduate Thesis
        links:
          - icon: fab fa-github
            url: https://github.com/Sahil624/qGrasp?tab=readme-ov-file

      - title: Quantum Simulator
        content: >
          QNS aims at facilitating Open-Ended Inquiry. Unlike traditional game-winning and game-losing conditions, 
          QNS presents an open-ended scenario where students get to build their own network infrastructures and 
          then watch their own designed functionality failing due to these modes, for instance, eavesdropping 
          detection or decoherence. They develop from ‘sitting around and consuming knowledge’ to ‘actively 
          building an understanding’ on their own. 
        image: qsim.png
        badges:
          - Python
          - AI
          - Quantum Cryptography
          - LangChain
          - Graduate Thesis
        links:
          - icon: fab fa-github
            url: https://github.com/ksucybersec/q-sim

      - title: Financial Knowledge Graph
        content: >
          Constructed a large-scale Financial Knowledge Graph (FKG) by processing
          350k+ news articles using a BERT-based relation extraction model
          (SMARTe) and spaCy to resolve over 200k entities into Neo4j. Engineered
          a custom "Ripple Effect" propagation algorithm to quantify and simulate
          systemic risk transmission across corporate networks in real-time.
        image: /blogs/news_driven_news_propogation/files/ner_distribution.png
        badges:
          - Python
          - Neo4j
          - BERT
          - FastAPI
          - WebSockets
        featured:
          name: Blog Post
          link: /blogs/news_driven_news_propogation/
        links:
          - icon: fab fa-github
            url: /blogs/news_driven_news_propogation/

      - title: Edge AI Optimization
        content: >
          Fine-tuned YOLOv11n for object detection (tomato ripeness), achieving
          95.5% mAP@0.5 on a custom composite dataset. Optimized the model for
          resource-constrained edge devices using OpenVINO INT8 quantization,
          achieving a 4.3x inference speedup (6.5ms) with negligible accuracy
          loss.
        image: /blogs/quantized_yolo_for_edge_classification/img/media/image1.png
        badges:
          - Computer Vision
          - YOLOv11
          - OpenVINO
          - Edge AI
          - Python
        featured:
          name: Case Study
          link: /blogs/quantized_yolo_for_edge_classification/
        links:
          - icon: fab fa-github
            url: https://github.com/sahil624/
            
      - title: DayCanvas
        content: >
          An AI-powered journal visualizer that transforms written emotions into
          visual narratives. The multi-model pipeline integrates Claude 3.5 for
          emotional pattern extraction and Google's Imagen 3 for generating visual
          metaphors, creating a parallel universe that reflects the user's daily
          journey.
        image: /daycanvas.jpeg
        badges:
          - Generative AI
          - Claude 3.5
          - Imagen 3
          - NLP
          - Django
        featured:
